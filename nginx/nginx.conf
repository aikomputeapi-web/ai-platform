# ══════════════════════════════════════════════════════════════════════════════
#  AI Platform — Nginx (Single Domain, Single Dashboard)
# ══════════════════════════════════════════════════════════════════════════════
#
#  yourdomain.com/v1/*   → OmniRoute API (OpenAI-compatible, users connect here)
#  yourdomain.com/*      → OmniRoute Dashboard (your admin panel)
#  yourdomain.com/health → Health check
#
# ══════════════════════════════════════════════════════════════════════════════

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;
    server_tokens off;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$upstream_response_time';
    access_log /var/log/nginx/access.log main buffer=16k flush=2m;
    error_log /var/log/nginx/error.log warn;

    # Timeouts (tuned for LLM streaming — responses can take minutes)
    keepalive_timeout 300s;
    client_header_timeout 60s;
    client_body_timeout 300s;
    send_timeout 300s;
    client_max_body_size 50m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=dash_limit:10m rate=10r/s;

    # Upstreams with keepalive connections
    upstream omniroute_dashboard {
        server 127.0.0.1:20128;
        keepalive 32;
    }

    upstream omniroute_api {
        server 127.0.0.1:20129;
        keepalive 100;
    }

    upstream customer_portal {
        server 127.0.0.1:3000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect ──
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    # MAIN SERVER — Single domain
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name DOMAIN_PLACEHOLDER;

        # SSL
        ssl_certificate /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=63072000" always;

        # ──────────────────────────────────────────────────────────────────
        # /v1/* — OpenAI-compatible API
        #
        # Your users set:   base_url: https://yourdomain.com/v1
        # ──────────────────────────────────────────────────────────────────
        location /v1/ {
            limit_req zone=api_limit burst=40 nodelay;

            proxy_pass http://omniroute_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE streaming (critical — do not buffer LLM responses)
            proxy_set_header Cache-Control no-cache;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_request_buffering off;
        }



        # ──────────────────────────────────────────────────────────────────
        # /health — Quick health check
        # ──────────────────────────────────────────────────────────────────
        location /health {
            access_log off;
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        # ──────────────────────────────────────────────────────────────────
        # /* — Customer Portal (Landing Page, Login, Dashboard)
        # ──────────────────────────────────────────────────────────────────
        location / {
            limit_req zone=dash_limit burst=20 nodelay;

            proxy_pass http://customer_portal;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    # ADMIN SERVER — admin.domain.com
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name ~^admin\.;

        # Reuse the main domain's SSL cert
        ssl_certificate /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # ──────────────────────────────────────────────────────────────────
        # /* — OmniRoute Admin Dashboard
        # ──────────────────────────────────────────────────────────────────
        location / {
            limit_req zone=dash_limit burst=20 nodelay;

            proxy_pass http://omniroute_dashboard;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE support for dashboard live view
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 600s;
        }
    }
}
